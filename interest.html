<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deqly — Register Your Interest</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { font-family: 'Space Grotesk', sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #fff; color: #0A0A0A; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

    /* ── Nav ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    nav img { height: 32px; }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 0px 24px 100px;
    }
    .card {
      background: transparent;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .card h1 {
      font-size: 32px; font-weight: 700;
      letter-spacing: -0.03em; line-height: 1.1;
      margin-bottom: 12px; color: #0A0A0A;
    }
    .card p {
      font-size: 16px; color: rgba(10,10,10,0.5);
      line-height: 1.7; margin-bottom: 32px;
    }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: rgba(10,10,10,0.6); margin-bottom: 6px;
    }
    .form-group input {
      width: 100%; padding: 14px 16px;
      border: 1.5px solid rgba(0,0,0,0.12);
      border-radius: 12px; font-size: 15px;
      font-family: 'Space Grotesk', sans-serif;
      color: #0A0A0A; outline: none;
      transition: border-color 0.18s ease;
    }
    .form-group input:focus { border-color: #7C4DFF; }
    .btn-submit {
      width: 100%; padding: 15px;
      background: #fa5252; color: #fff;
      border: none; border-radius: 999px;
      font-size: 16px; font-weight: 700;
      letter-spacing: -0.01em; cursor: pointer;
      transition: transform 0.18s cubic-bezier(0.34,1.56,0.64,1);
      margin-top: 8px;
    }
    .btn-submit:hover { transform: scale(1.03); }
    .btn-submit:active { transform: scale(0.97); }

    /* ── Footer ── */
    footer {
      background: #050505;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding: 32px 24px;
      text-align: center;
    }
    footer img { height: 24px; filter: brightness(0) invert(1); opacity: 0.75; display: block; margin: 0 auto; }

    @media (max-width: 580px) {
      .card { padding: 36px 24px; }
      .card h1 { font-size: 26px; }
      .kv-img { width: 360px !important; max-width: 100%; margin: 0 auto 28px; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html">
      <img src="brand_assets/Logo.png" alt="Deqly" />
    </a>
  </nav>

  <main>
    <div class="card">
      <img src="brand_assets/Interest-KV.png" alt="" class="kv-img" style="width: 420px; height: auto; display: block; margin: 0 auto 28px;" />
      <h1>Be the first to know</h1>
      <p><strong style="color: #0A0A0A;">Deqly is coming soon.</strong> Register your interest and we'll let you know the moment it's live.</p>

      <form>
        <div class="form-group">
          <label for="name">Full name</label>
          <input type="text" id="name" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>
        <button type="submit" class="btn-submit">Register my interest →</button>
      </form>
    </div>
  </main>

  <footer>
    <img src="brand_assets/Logo.png" alt="Deqly" />
  </footer>

</body>
</html>
